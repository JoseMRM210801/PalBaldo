<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Participar | Fiesta de 15</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="theme-participate">
    <nav class="topbar glass">
      <a class="brand" href="index.html">✨ XV Gala</a>
      <div class="nav-links">
        <a href="index.html">Inicio</a>
        <a class="nav-admin" href="admin.html">Administración</a>
      </div>
    </nav>

    <main class="center-wrap padded-top">
      <section class="panel-light floating" id="loginPanel">
        <h1>Iniciar sesión para participar</h1>
        <p>Ingresa tu nombre para enviar una foto y un mensaje para la quinceañera.</p>
        <form id="loginForm" class="stack">
          <label>
            Nombre
            <input type="text" id="loginName" placeholder="Tu nombre" required />
          </label>
          <button type="submit" class="btn btn-gold">Continuar</button>
        </form>
      </section>

      <section class="panel-light hidden reveal-up" id="uploadPanel">
        <h2>Comparte tu mejor momento</h2>
        <form id="uploadForm" class="stack">
          <label class="upload-box">
            <span class="upload-title">Fotografía</span>
            <input type="file" id="photo" accept="image/*" required />
            <span class="upload-help">Selecciona una imagen para vista previa inmediata.</span>
          </label>

          <figure class="preview-card" id="previewCard">
            <img id="previewImage" alt="Vista previa" />
            <figcaption>Vista previa de tu foto</figcaption>
          </figure>

          <label>
            Mensaje
            <textarea id="message" rows="4" placeholder="Escribe un mensaje bonito..." required></textarea>
          </label>
          <button type="submit" class="btn btn-gold">Enviar para aprobación</button>
        </form>
        <a href="index.html" class="link">Volver a la pantalla principal</a>
      </section>
      <p id="participantStatus" class="status-message" data-type="info"></p>
    </main>

    <script type="module" src="participate.js"></script>
  </body>
</html>
